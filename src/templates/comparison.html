<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Comparison</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('{{ url_for("static", filename="images/background.jpg") }}');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
        }

        .image-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .image-container {
            text-align: center;
        }

        .image-preview {
            max-width: 100%;
            border-radius: 6px;
            border: 1px solid #30363d;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #238636;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2ea043;
        }

        .btn-secondary {
            background-color: #21262d;
            color: #c9d1d9;
        }

        .btn-secondary:hover {
            background-color: #30363d;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            width: 400px;
            color: #c9d1d9;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 1.2em;
            font-weight: 500;
        }

        .modal-close {
            cursor: pointer;
            font-size: 1.5em;
            color: #8b949e;
        }

        .modal-body {
            margin: 15px 0;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /*加载动画*/
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            color: white;
            font-size: 1.5em;
        }

        .loading-spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid rgba(0, 0, 0, 0.52);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 保留进度条样式 */
        .progress-container {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 20px 0;
            position: relative;
        }

        .ink-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg,
                rgba(255,255,255,0.8) 0%,
                rgba(200,200,200,0.9) 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-text {
            position: absolute;
            right: -40px;
            top: -4px;
            color: rgba(255,255,255,0.8);
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
        }

        /* 库列表项样式 */
        .library-item {
            padding: 10px;
            margin: 5px 0;
            background: #21262d;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .library-item:hover {
            background: #30363d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图像对比</h1>
        <div class="image-comparison">
            <div class="image-container">
                <h3>原图</h3>
                <img src="{{ original_image }}" class="image-preview">
            </div>
            <div class="image-container">
                <h3>处理后的图像</h3>
                <img src="{{ processed_image }}" class="image-preview">
            </div>
        </div>
        <div class="button-group">
            <button class="btn btn-primary" onclick="saveImage()">保存</button>
            <button class="btn btn-primary" onclick="saveToLibrary()">保存到库</button>
            <button class="btn btn-secondary" onclick="handleUnsatisfied()">效果不佳</button>
            <button class="btn btn-secondary" onclick="window.history.back()">返回</button>
        </div>
    </div>

    <div id="unsatisfied-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">对结果不满意吗?</span>
                <span class="modal-close" onclick="closeUnsatisfiedModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p>请观看说明书后再选择更优参数，或者让系统根据图像推荐最佳参数 (将花费1分钟).</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="openManual()">说明书</button>
                <button class="btn btn-primary" onclick="startAutoSelect()">自动检测</button>
            </div>
        </div>
    </div>

    <div id="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="progress-container">
            <div class="ink-progress-bar"></div>
            <span class="progress-text">0%</span>
        </div>
        <p>Processing, please wait...</p>
    </div>

    <!-- 库选择模态框 -->
    <div id="library-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">选择图像库</span>
                <span class="modal-close" onclick="closeLibraryModal()">&times;</span>
            </div>
            <div class="modal-body" id="library-list">
                <!-- 动态加载库列表 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeLibraryModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        function saveImage() {
            const link = document.createElement('a');
            link.href = "{{ processed_image }}";
            link.download = 'processed_image.jpg';
            link.click();
        }

        // 替换原有saveToLibrary函数
        function saveToLibrary() {
            // 显示库选择模态框
            document.getElementById('library-modal').style.display = 'flex';

            // 加载库列表
            fetch('/get_user_libraries')
                .then(response => response.json())
                .then(data => {
                    const listContainer = document.getElementById('library-list');
                    listContainer.innerHTML = '';

                    data.libraries.forEach(lib => {
                        const div = document.createElement('div');
                        div.className = 'library-item';
                        div.innerHTML = lib.name;
                        div.onclick = () => confirmSave(lib.id);
                        listContainer.appendChild(div);
                    });
                });
        }

        function confirmSave(libraryId) {
            closeLibraryModal();

            fetch('/save_to_library', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    image_path: "{{ processed_image }}",
                    library_id: libraryId
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Image saved to library successfully!');
                } else {
                    alert('Failed to save image: ' + data.message);
                }
            });
        }

        function closeLibraryModal() {
            document.getElementById('library-modal').style.display = 'none';
        }

        function handleUnsatisfied() {
            document.getElementById('unsatisfied-modal').style.display = 'flex';
        }

        function closeUnsatisfiedModal() {
            document.getElementById('unsatisfied-modal').style.display = 'none';
        }

        function openManual() {
            window.location.href = "{{ url_for('manual', library_id=library_id) }}";
        }

        function updateProgress() {
            fetch('/get_progress')
                .then(response => response.json())
                .then(data => {
                    progressBar.style.width = `${data.progress}%`;
                    progressText.textContent = `${data.progress}%`;

                    // 更新状态信息
                    const statusMap = {
                        'initializing': 'Initializing...',
                        'loading_image': 'Loading image...',
                        'image_loaded': 'Image loaded, starting analysis...'
                    };

                    let statusText = data.status;
                    if(statusText.startsWith('testing_model_')) {
                        statusText = `Testing ${data.status.replace('testing_model_', '')} model`;
                    } else if(statusText.startsWith('testing_noise_')) {
                        statusText = `Testing noise level ${data.status.replace('testing_noise_', '')}`;
                    }

                    overlay.querySelector('p').innerHTML = `
                        ${statusMap[data.status] || statusText}<br>
                        Current Model: ${data.model || 'N/A'}<br>
                        Noise Level: ${data.noise_level !== null ? data.noise_level : 'N/A'}
                    `;

                    if (data.progress < 100) {
                        setTimeout(updateProgress, 1000);
                    } else {
                        window.location.href = `/auto_select?image_path=${encodeURIComponent(imagePath)}&library_id=${libraryId}`;
                    }
                });
        }

        function startAutoSelect() {
            const overlay = document.getElementById('loading-overlay');
            const progressBar = document.querySelector('.ink-progress-bar');
            const progressText = document.querySelector('.progress-text');
            const libraryId = "{{ library_id }}";
            const originalImageUrl = "{{ original_image }}";
            const imagePath = originalImageUrl.split('/').pop();

            // 重置进度
            progressBar.style.width = '0%';
            progressText.textContent = '0%';
            overlay.style.display = 'flex';

            // 启动进度轮询
            const progressInterval = setInterval(() => {
                fetch('/get_progress')
                    .then(response => response.json())
                    .then(data => {
                        const progress = data.progress;
                        progressBar.style.width = `${progress}%`;
                        progressText.textContent = `${progress}%`;

                        // 更新状态提示
                        if (data.model) {
                            overlay.querySelector('p').innerHTML =
                                `Processing ${data.model}<br>Noise Level ${data.noise_level}...`;
                        }

                        // 进度完成时跳转
                        if (progress >= 100) {
                            clearInterval(progressInterval);
                            window.location.href = `/auto_select?image_path=${encodeURIComponent(imagePath)}&library_id=${libraryId}`;
                        }
                    });
            }, 1000);


            // 发送请求
            fetch('/auto_select_best_model', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    image_path: imagePath,
                    library_id: libraryId
                })
            }).then(response => {
                if (response.ok) {
                    updateProgress(); // 启动进度轮询
                }
            })
            .catch(error => {
                    clearInterval(progressInterval);
                    alert('Request failed: ' + error.message);
                    overlay.style.display = 'none';
                });
        }

        // 移除原有重复的加载动画创建代码
        window.onclick = function(event) {
            const modal = document.getElementById('unsatisfied-modal');
            if (event.target === modal) {
                closeUnsatisfiedModal();
            }
        }
    </script>
</body>
</html>
