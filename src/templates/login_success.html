<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success</title>
    <style>
        @font-face {
            font-family: 'TitleFont';
            src: url('{{ url_for("static", filename="front/f3.ttf") }}') format('truetype');
        }
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: url('{{ url_for("static", filename="images/bg5.jpg") }}');
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        /* 新增背景覆盖层 */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }
        .content {
            background: rgba(0, 0, 0, 0.7); /* 深色半透明背景 */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* 添加阴影效果 */
            text-align: center;
            max-width: 600px; /* 限制最大宽度 */
            animation: fadeIn 2s;
        }
        h1 {
            font-family: 'TitleFont', sans-serif;
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center; /* 按钮在容器内水平居中 */
        }
        .button {
            display: inline-block;
            padding: 12px 18px; /* 调整按钮内边距 */
            background-color: transparent;
            color: white;
            text-decoration: none;
            border: 1px solid white; /* 添加白色边框 */
            border-radius: 8px; /* 更圆润的边角 */
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease; /* 添加变形动画 */
            width: 150px; /* 设置按钮宽度 */
            text-align: center; /* 文字居中 */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3); /* 按钮阴影 */
        }
        .button:hover {
            background-color: rgba(255, 255, 255, 0.1); /* 悬停时背景变为半透明白色 */
            transform: scale(1.05); /* 鼠标悬停时放大效果 */
        }

        .button:active {
            background-color: rgba(255, 255, 255, 0.2); /* 点击时背景变为更深的透明白色 */
            transform: scale(0.95); /* 鼠标点击时缩小效果 */
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* 新增过渡动画样式 */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .content {
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .page-leave .content {
            transform: scale(0.9);
            opacity: 0;
        }

        @keyframes page-enter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* 新增背景过渡动画 */
        .bg-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            animation: bg-fade 1.2s ease-in-out;
        }

        @keyframes bg-fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-transition"></div>
    <div class="bg-overlay"></div>
    <div class="page-transition"></div>
    <div class="content">
        <h1> 灵晰影溯 | VisionaryX</h1>
        <br>
        <div class="button-container">
            <a href="{{ url_for('my_library') }}" class="button">图像库</a>
            <a href="{{ url_for('super_resolution', library_id=library_id) }}" class="button">超分重建</a>
            <a href="{{ url_for('logout') }}" class="button">退出</a>
        </div>
    </div>
</body>
</html>

<script>
// 修改原有跳转逻辑
    document.querySelectorAll('.button[href]').forEach(link => {
        link.addEventListener('click', function(e) {
            if(this.href.includes('my_library')) {
                e.preventDefault();
                const transition = document.querySelector('.page-transition');
                const content = document.querySelector('.content');

                // 预加载目标页面背景
                const preloadBg = new Image();
                preloadBg.src = "{{ url_for('static', filename='images/bg3.jpg') }}";

                // 创建临时背景层
                const tempBg = document.createElement('div');
                tempBg.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: url(${preloadBg.src});
                    background-size: cover;
                    opacity: 0;
                    z-index: -1;
                    transition: opacity 0.8s ease;
                `;
                document.body.appendChild(tempBg);

                // 触发动画
                document.body.classList.add('page-leave');
                transition.style.opacity = '1';

                setTimeout(() => {
                    tempBg.style.opacity = '1';
                }, 200);

                // 跳转逻辑
                setTimeout(() => {
                    window.location.href = this.href;
                }, 800);
            }
        });
    });
</script>
