<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionaryX | introduction</title>
    <style>
        :root {
            --ink-black: #2d1f1b;
            --paper-white: #f9f6f0;
            --cinnabar: #c03a2b;
            --shadow-gray: rgba(45, 31, 27, 0.1);
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: url('{{ url_for("static", filename="images/bg4.png") }}');
            background-size: cover;
            color: var(--ink-black);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 主容器 */
        .scroll-wrapper {
            width: 85%;
            max-width: 800px;
            margin: 5% auto;
            padding: 80px 50px 60px;
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 0 30px var(--shadow-gray);
            border-radius: 8px;
            position: relative;
            opacity: 0;
            animation: fadeIn 1s forwards 0.5s;
        }

        /* 标题组 */
        .title-group {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--cinnabar);
            padding-bottom: 20px;
            opacity: 0;
            animation: fadeIn 1s forwards 0.8s;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--cinnabar);
            margin: 0 0 15px 0;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #665b52;
            line-height: 1.6;
        }

        /* 功能区块 */
        .feature-column {
            display: grid;
            gap: 30px;
            margin-top: 40px;
        }

        .feature-card {
            padding: 25px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(192, 58, 43, 0.15);
            border-radius: 6px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        .feature-card:nth-child(1) {
            animation-delay: 1.2s;
        }

        .feature-card:nth-child(2) {
            animation-delay: 1.5s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(192, 58, 43, 0.1);
        }

        .feature-title {
            font-size: 1.3rem;
            color: var(--cinnabar);
            margin: 0 0 15px 0;
            position: relative;
            padding-left: 20px;
        }

        .feature-title::before {
            content: "·";
            position: absolute;
            left: 0;
            color: var(--cinnabar);
            font-size: 1.8rem;
            top: -3px;
        }

        .feature-desc {
            font-size: 1rem;
            color: #665b52;
            line-height: 1.8;
            margin: 0;
        }

        /* 超分重建效果展示 */
        .demo-section {
            margin-top: 60px;
            opacity: 0;
            animation: fadeIn 1s forwards 1.8s;
        }

        .demo-title {
            font-size: 1.5rem;
            color: var(--cinnabar);
            margin-bottom: 30px;
            text-align: center;
        }

        /* 前两张图像容器 */
        .small-images {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        /* 后两张图像容器 */
        .large-images {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .image-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 3px 10px var(--shadow-gray);
            transition: transform 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-5px);
        }

        .image-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-card .caption {
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #665b52;
        }

        /* 小图像的样式 */
        .small-image-card {
            width: 200px;
        }

        .small-image-card img {
            width: 100%;
            height: auto;
        }

        /* 大图像的样式 */
        .large-image-card {
            width: 400px;
        }

        .large-image-card img {
            width: 100%;
            height: auto;
        }

        /* 返回按钮 */
        .back-btn {
            margin-top: 30px;
            padding: 12px 20px;
            background: var(--cinnabar);
            color: var(--paper-white);
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s forwards 2s;
        }

        .back-btn:hover {
            background: #a83225;
            letter-spacing: 2px;
            transform: scale(1.05);
        }

        /* 动画定义 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(20px);
            }
        }
    </style>
</head>
<body>
    <div class="scroll-wrapper">
        <!-- 标题区 -->
        <div class="title-group">
            <h1>灵晰影溯</h1>
            <div class="subtitle">
                <p>"灵晰"寓意视觉清晰化，使模糊影像焕发新生；</p>
                <p>"影溯"寓意追本溯源，重现画面本真之境。</p>
                <p>「VisionaryX」寄寓前瞻视野，X象征无限可能</p>
            </div>
        </div>

        <!-- 功能说明 -->
        <div class="feature-column">
            <!-- 图像库 -->
            <div class="feature-card">
                <h3 class="feature-title">图像库管理</h3>
                <p class="feature-desc">
                    创建和删除多个图像库，支持上传图像、智能归类、在线编辑、检索等功能。<br>
                    提供标签视图和全局视图，方便管理和浏览图像。
                </p>
            </div>

            <!-- 超分重建 -->
            <div class="feature-card">
                <h3 class="feature-title">超分重建</h3>
                <p class="feature-desc">
                    集成四种超分重建算法：ResNet50、VGG7、UpConv7 和 ResNet10。<br>
                    支持无损放大、降噪或放大+降噪，可自定义降噪程度。<br>
                    提供参数说明书和自动推荐最佳参数功能。
                </p>
            </div>
        </div>

        <!-- 超分重建效果展示 -->
        <div class="demo-section">
            <h3 class="demo-title">超分重建效果展示</h3>

            <!-- 前两张图像容器 -->
            <div class="small-images">
                <div class="image-card small-image-card">
                    <img src="{{ url_for('static', filename='images/1src.png') }}" alt="原图">
                    <div class="caption">原图</div>
                </div>
                <div class="image-card small-image-card">
                    <img src="{{ url_for('static', filename='images/1dis.png') }}" alt="变清晰效果">
                    <div class="caption">变清晰效果</div>
                </div>
            </div>

            <!-- 后两张图像容器 -->
            <div class="large-images">
                <div class="image-card large-image-card">
                    <img src="{{ url_for('static', filename='images/1lar.png') }}" alt="普通放大4倍效果">
                    <div class="caption">普通放大4倍效果</div>
                </div>
                <div class="image-card large-image-card">
                    <img src="{{ url_for('static', filename='images/1SR.png') }}" alt="超分重建放大4倍效果">
                    <div class="caption">超分重建放大4倍效果</div>
                </div>
            </div>
        </div>

        <!-- 返回按钮 -->
        <div style="text-align: center; margin-top: 30px;">
            <a href="{{ url_for('index') }}" class="back-btn">返回主页</a>
        </div>
    </div>
</body>
</html>
